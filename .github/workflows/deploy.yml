name: Full Deploy (Frontend + Backend)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Build frontend (IMPORTANT: env added)
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
        env:
          VITE_API_URL: https://api.crud.vaibhavmakvana.in

      # 4️⃣ Copy frontend
      - name: Copy frontend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/dist"
          target: "/home/ubuntu/frontend-temp"

      # 5️⃣ Deploy
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # --- FRONTEND ---
            sudo rm -rf /var/www/crud-app/*
            sudo mv /home/ubuntu/frontend-temp/frontend/dist/* /var/www/crud-app/
            sudo chown -R www-data:www-data /var/www/crud-app

            # cleanup temp
            rm -rf /home/ubuntu/frontend-temp

            # --- BACKEND ---
            cd ~/crud-app
            git pull origin main

            docker compose down
            docker compose up -d --build